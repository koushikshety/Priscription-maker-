<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koushik Clinic - WebView Compatible</title>
    <style>
        :root {
            --primary-color: #e0533c;
            --blue-ink: #102a73;
            --green-color: #2ecc71;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .editor-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 15px 0;
            color: #333;
            text-align: center;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 0.8rem;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 70px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .col {
            flex: 1;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-update {
            background-color: var(--primary-color);
        }

        .btn-share {
            background-color: var(--green-color);
            font-size: 1.05rem;
        }

        /* Screen Preview Container */
        .prescription-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3072 / 4096;
            background-color: #fff;
            background-image: url('prescription1.jpg'); /* Your default template path */
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            container-type: inline-size;
            container-name: prescription;
        }

        .overlay {
            position: absolute;
            color: var(--blue-ink);
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold;
            line-height: 1.3;
            white-space: pre-wrap;
            cursor: move;
            touch-action: none;
            padding: 4px;
            border: 1px dashed rgba(16, 42, 115, 0.3);
            background-color: rgba(255, 255, 255, 0.45);
            border-radius: 4px;
        }

        /* Initial visual layout percentages */
        #outName   { left: 17%; top: 20.2%; font-size: 5.0cqw; }
        #outAge    { left: 56%; top: 20.2%; font-size: 4.6cqw; }
        #outSex    { left: 17%; top: 22.4%; font-size: 4.6cqw; }
        #outDate   { left: 56%; top: 22.4%; font-size: 4.3cqw; }
        #outVitals { left: 8%;  top: 32.0%; font-size: 3.8cqw; line-height: 1.8; width: 30%; }
        #outMeds   { left: 45%; top: 32.0%; font-size: 4.1cqw; line-height: 2.1; width: 50%; }

        /* WebView Fullscreen Safe Fallback Overlay */
        .fullscreen-preview {
            display: none;
            position: fixed;
            z-index: 999999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .fullscreen-preview img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            user-select: contain !important;
            -webkit-user-select: contain !important;
        }

        .preview-instructions {
            color: #fff;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .btn-close {
            margin-top: 15px;
            background-color: var(--primary-color);
            width: auto;
            padding: 10px 30px;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Koushik Clinic Creator</h2>
        
        <div class="form-group">
            <label>Template Background Image Loader (Optional):</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="loadImage(event)">
        </div>

        <form id="rxForm" onsubmit="event.preventDefault(); updatePrescription();">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inName">Patient Name</label>
                        <input type="text" id="inName" value="Koushik">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inAge">Age</label>
                        <input type="text" id="inAge" value="23 Yrs">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inSex">Gender</label>
                        <input type="text" id="inSex" value="✔ Male">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inDate">Date</label>
                        <input type="text" id="inDate">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="inVitals">Symptoms / Vitals (Left Side)</label>
                <textarea id="inVitals">Fever - 3 Days&#10;BP: 120/80&#10;Pulse: 78</textarea>
            </div>

            <div class="form-group">
                <label for="inMeds">Treatment / Rx (Right Side)</label>
                <textarea id="inMeds">1. Tab. Clavam 625 mg&#10;   1 - 0 - 1  x 5 days&#10;&#10;2. Tab. Paracetamol 650&#10;   1 - 1 - 1 (SOS)</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-update">Update Screen Layout</button>
                <button type="button" class="btn-share" onclick="shareOrSavePrescription()">📤 SEND / SAVE PRESCRIPTION</button>
            </div>
        </form>
    </div>

    <div class="prescription-wrapper" id="previewWrapper">
        <div id="outName" class="overlay draggable"></div>
        <div id="outAge" class="overlay draggable"></div>
        <div id="outSex" class="overlay draggable"></div>
        <div id="outDate" class="overlay draggable"></div>
        <div id="outVitals" class="overlay draggable"></div>
        <div id="outMeds" class="overlay draggable"></div>
    </div>

    <div id="previewModal" class="fullscreen-preview">
        <div class="preview-instructions">
            📸 <strong>Prescription Ready!</strong><br>
            Please <strong>long-press (hold)</strong> the image to save it, or take a <strong>screenshot</strong>.
        </div>
        <img id="fallbackImage" alt="Prescription Output">
        <button type="button" class="btn-close" onclick="closePreview()">Go Back</button>
    </div>

    <script>
        let templateImageSrc = 'prescription1.jpg'; // Keeps track of loaded image source

        window.onload = function() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            document.getElementById("inDate").value = `${dd}/${mm}/${yyyy}`;
            
            updatePrescription();
            initDragAndDrop();
        };

        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                templateImageSrc = reader.result;
                document.getElementById('previewWrapper').style.backgroundImage = `url('${templateImageSrc}')`;
                updatePrescription();
            }
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function updatePrescription() {
            document.getElementById("outName").textContent = document.getElementById("inName").value;
            document.getElementById("outAge").textContent = document.getElementById("inAge").value;
            document.getElementById("outSex").textContent = document.getElementById("inSex").value;
            document.getElementById("outDate").textContent = document.getElementById("inDate").value;
            document.getElementById("outVitals").textContent = document.getElementById("inVitals").value;
            document.getElementById("outMeds").textContent = document.getElementById("inMeds").value;
        }

        // Generates the canvas and either shares or renders it in a WebView-safe overlay
        function shareOrSavePrescription() {
            const bgImg = new Image();
            bgImg.crossOrigin = "anonymous";
            bgImg.src = templateImageSrc;

            bgImg.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = bgImg.naturalWidth || 1536;
                canvas.height = bgImg.naturalHeight || 2048;

                // Draw background template
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                const container = document.getElementById('previewWrapper');
                const containerRect = container.getBoundingClientRect();
                const overlays = document.querySelectorAll('.overlay');

                overlays.forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const pctX = (rect.left - containerRect.left) / containerRect.width;
                    const pctY = (rect.top - containerRect.top) / containerRect.height;

                    const canvasX = pctX * canvas.width;
                    const canvasY = pctY * canvas.height;

                    // Relative scale font sizes based on canvas width
                    const baseFontSizePct = el.id.includes('Name') ? 0.05 : 0.042; 
                    const canvasFontSize = baseFontSizePct * canvas.width;

                    ctx.fillStyle = '#102a73'; // Indigo/Ink Blue
                    ctx.font = `bold ${canvasFontSize}px 'Comic Sans MS', sans-serif`;
                    ctx.textBaseline = "top";

                    const lines = el.textContent.split('\n');
                    let lineSpacingMultiplier = 1.3;
                    if (el.id === 'outVitals') lineSpacingMultiplier = 1.8;
                    if (el.id === 'outMeds') lineSpacingMultiplier = 2.1;

                    const computedLineHeight = canvasFontSize * lineSpacingMultiplier;

                    lines.forEach((line, idx) => {
                        ctx.fillText(line, canvasX, canvasY + (idx * computedLineHeight));
                    });
                });

                // Convert Canvas to a real file object and try to Share
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        showFallbackPreview(canvas.toDataURL('image/jpeg', 0.95));
                        return;
                    }

                    const file = new File([blob], "prescription.jpg", { type: "image/jpeg" });

                    // Web Share API Check (WebView Friendly)
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'Patient Prescription',
                            text: 'Prescription generated from Koushik Clinic Assistant.'
                        })
                        .catch(() => {
                            // If share fails or gets canceled, open the fallback preview screen
                            showFallbackPreview(canvas.toDataURL('image/jpeg', 0.95));
                        });
                    } else {
                        // Fallback for older wrappers/WebViews that do not support Web Share
                        showFallbackPreview(canvas.toDataURL('image/jpeg', 0.95));
                    }
                }, 'image/jpeg', 0.95);
            };

            bgImg.onerror = function() {
                alert("Failed to load the background template image. Ensure the image is accessible.");
            };
        }

        // Show Fullscreen WebView-safe container 
        function showFallbackPreview(dataUrl) {
            document.getElementById('fallbackImage').src = dataUrl;
            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }

        // WebView Compatible Drag Logic
        function initDragAndDrop() {
            const draggables = document.querySelectorAll('.draggable');
            const container = document.getElementById('previewWrapper');

            draggables.forEach(el => {
                let isDragging = false;
                let startX, startY, initialLeft, initialTop;

                el.addEventListener('mousedown', startDrag);
                el.addEventListener('touchstart', startDrag, { passive: false });

                function startDrag(e) {
                    isDragging = true;
                    const event = e.touches ? e.touches[0] : e;
                    startX = event.clientX;
                    startY = event.clientY;

                    const rect = el.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    
                    initialLeft = rect.left - containerRect.left;
                    initialTop = rect.top - containerRect.top;

                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('mouseup', stopDrag);
                    document.addEventListener('touchend', stopDrag);
                }

                function dragMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();

                    const event = e.touches ? e.touches[0] : e;
                    const deltaX = event.clientX - startX;
                    const deltaY = event.clientY - startY;

                    const currentLeftPx = initialLeft + deltaX;
                    const currentTopPx = initialTop + deltaY;

                    const containerRect = container.getBoundingClientRect();
                    const leftPercent = (currentLeftPx / containerRect.width) * 100;
                    const topPercent = (currentTopPx / containerRect.height) * 100;

                    el.style.left = Math.max(0, Math.min(leftPercent, 90)) + '%';
                    el.style.top = Math.max(0, Math.min(topPercent, 95)) + '%';
                }

                function stopDrag() {
                    isDragging = false;
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('touchmove', dragMove);
                }
            });
        }
    </script>
</body>
</html>
