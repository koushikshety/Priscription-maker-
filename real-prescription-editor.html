<html lang="en">
<head>

    <title>Koushik Clinic - Fullscreen Prescription Canvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Herr+Von+Muellerhoff&family=Over+the+Rainbow&family=League+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #e0533c;
            --blue-ink: #102a73;
            --green-color: #2ecc71;
            --dark-bg: #2d3748;
            --notice-bg: #fff5f5;
            --notice-border: #feb2b2;
            --notice-text: #c53030;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .wrapper-notice-bar {
            width: 100%;
            max-width: 600px;
            background-color: var(--notice-bg);
            border: 1px solid var(--notice-border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .wrapper-notice-bar p { margin: 0; font-size: 0.85rem; color: var(--notice-text); font-weight: bold; line-height: 1.4; }

        .btn-notice-copy {
            background-color: var(--notice-text);
            color: white;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .btn-notice-copy.success { background-color: var(--green-color); }

        .editor-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 { margin-top: 0; color: #333; text-align: center; font-size: 1.3rem; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; color: #555; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        textarea { resize: vertical; height: 80px; font-family: monospace; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        .file-input-wrapper {
            background-color: #e3faf2;
            border: 2px dashed var(--green-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-row { display: flex; gap: 10px; width: 100%; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        .btn-update { background-color: var(--primary-color); color: white; }
        .btn-render { background-color: var(--green-color); color: white; }
        .btn-print { background-color: var(--dark-bg); color: white; }

        .prescription-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3072 / 4096;
            background-color: #e5e5e5;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            container-type: inline-size;
            container-name: prescription;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .placeholder-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #666; text-align: center; font-weight: bold; width: 80%; pointer-events: none;
        }

        .overlay {
            position: absolute; color: var(--blue-ink); font-family: 'Reenie Beanie', cursive;
            font-weight: 500; line-height: 1.2; white-space: pre-wrap; transform: rotate(-0.5deg);
            cursor: move; display: none; touch-action: none; padding: 4px; border: 1px dashed transparent;
        }
