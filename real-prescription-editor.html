<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koushik Clinic - Drag & Drop Prescription Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Herr+Von+Muellerhoff&family=Over+the+Rainbow&family=League+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #e0533c;
            --blue-ink: #102a73;
            --green-color: #2ecc71;
            --whatsapp-color: #25d366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .editor-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
            font-family: monospace;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .col {
            flex: 1;
        }

        .file-input-wrapper {
            background-color: #e3faf2;
            border: 2px dashed var(--green-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-update {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-share {
            background-color: var(--whatsapp-color);
            color: white;
        }

        .btn-print {
            background-color: #2d3748;
            color: white;
        }

        .btn-fallback {
            background-color: #3182ce;
            color: white;
            font-size: 0.9rem;
            padding: 10px;
        }

        .prescription-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3072 / 4096;
            background-color: #e5e5e5;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            
            container-type: inline-size;
            container-name: prescription;
            
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-weight: bold;
            width: 80%;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            color: var(--blue-ink);
            font-family: 'Reenie Beanie', cursive;
            font-weight: 500;
            line-height: 1.2;
            white-space: pre-wrap;
            transform: rotate(-0.5deg);
            cursor: move;
            display: none;
            touch-action: none;
            padding: 4px;
            border: 1px dashed transparent;
        }

        .overlay:active {
            border: 1px dashed var(--primary-color);
            background: rgba(224, 83, 60, 0.05);
        }

        #outName   { left: 17%; top: 20.2%; font-size: 5.2cqw; }
        #outAge    { left: 56%; top: 20.2%; font-size: 4.8cqw; }
        #outSex    { left: 17%; top: 22.4%; font-size: 4.8cqw; }
        #outDate   { left: 56%; top: 22.4%; font-size: 4.5cqw; }
        #outVitals { left: 8%;  top: 32.0%; font-size: 4.0cqw; line-height: 1.8; }
        #outMeds   { left: 45%; top: 32.0%; font-size: 4.3cqw; line-height: 2.1; }

        /* Safe Mobile Preview Modal (Zero-Crash Download Bypass) */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            box-sizing: border-box;
            padding: 15px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: contain;
            -webkit-user-select: contain;
        }

        .modal-content {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 12px;
            display: block;
            user-select: auto !important;
            -webkit-user-select: auto !important;
        }

        .modal-instructions {
            color: #fff;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.4;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 500px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .btn-close-modal {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            flex: 1;
        }

        .btn-modal-share {
            background-color: var(--whatsapp-color);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            flex: 1;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            html, body {
                background: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: 100% !important;
                overflow: hidden !important;
            }
            .editor-container, .image-modal {
                display: none !important;
            }
            .prescription-wrapper {
                box-shadow: none !important;
                border-radius: 0 !important;
                width: 100vw !important;
                height: 133.33vw !important;
                max-width: 100% !important;
                max-height: 100% !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: avoid !important;
                
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .overlay {
                display: block !important;
                border: none !important;
                background: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Koushik Clinic Assistant</h2>
        
        <div class="file-input-wrapper">
            <label style="color:#27ae60; margin-bottom:5px;">Step 1: Choose your blank-prescription.jpg</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="loadImage(event)">
        </div>

        <form id="rxForm" onsubmit="event.preventDefault(); updatePrescription();">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inName">Patient Name</label>
                        <input type="text" id="inName" value="Koushik">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inAge">Age</label>
                        <input type="text" id="inAge" value="23 Yrs">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inSex">Gender</label>
                        <input type="text" id="inSex" value="✔ Male">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inDate">Date</label>
                        <input type="text" id="inDate">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="fontSelect">Natural Handwritings Style</label>
                        <select id="fontSelect" onchange="changeFont(this.value)">
                            <option value="'Reenie Beanie', cursive">Fast Clinical Script (Realistic)</option>
                            <option value="'Nothing You Could Do', cursive">Relaxed Blue Ink (Messy)</option>
                            <option value="'Over the Rainbow', cursive">Compact Felt Tip Pen</option>
                            <option value="'Herr Von Muellerhoff', cursive">Classic Sharp Cursive (Vintage)</option>
                            <option value="'League Script', sans-serif">Slanted Fine-Tip Pen</option>
                        </select>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="fontSizeSlider">Global Font Size Scale</label>
                        <input type="range" id="fontSizeSlider" min="3" max="7" step="0.1" value="4.8" oninput="changeFontSize(this.value)">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="inVitals">Symptoms / Vitals (Left Side)</label>
                <textarea id="inVitals">Fever - 3 Days&#10;BP: 120/80&#10;Pulse: 78</textarea>
            </div>

            <div class="form-group">
                <label for="inMeds">Treatment / Rx (Right Side)</label>
                <textarea id="inMeds">1. Tab. Clavam 625 mg&#10;   1 - 0 - 1  x 5 days&#10;&#10;2. Tab. Paracetamol 650&#10;   1 - 1 - 1 (SOS)</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-update">Update Text</button>
                <div class="btn-row">
                    <button type="button" class="btn-share" onclick="generatePrescriptionImage()">
                        <i>📤</i> Send / Save Prescription
                    </button>
                    <button type="button" class="btn-print" onclick="window.print()">Print / Save PDF</button>
                </div>
                
                <button type="button" class="btn-fallback" onclick="openInExternalBrowser()">
                    🌐 Open in Mobile Browser (Bypass Download Issues)
                </button>
            </div>
        </form>
    </div>

    <div class="prescription-wrapper" id="previewWrapper">
        <div class="placeholder-text" id="placeholderText">
            Please tap the green button above and choose your 'blank-prescription.jpg' to begin editing.
        </div>
        <div id="outName" class="overlay draggable"></div>
        <div id="outAge" class="overlay draggable"></div>
        <div id="outSex" class="overlay draggable"></div>
        <div id="outDate" class="overlay draggable"></div>
        <div id="outVitals" class="overlay draggable"></div>
        <div id="outMeds" class="overlay draggable"></div>
    </div>

    <div id="downloadModal" class="image-modal">
        <div class="modal-instructions">
            📱 <strong>Save or Share Prescription</strong><br>
            • Tap <strong>"Share Directly"</strong> to open WhatsApp, Email, or Drive.<br>
            • Or, **Long-press (hold finger down)** on the image to save it.
        </div>
        <img id="modalImage" class="modal-content" alt="Prescription Output">
        <div class="modal-buttons">
            <button class="btn-modal-share" id="btnNativeShare" onclick="sharePrescription()">📤 Share Directly</button>
            <button class="btn-close-modal" onclick="closeModal()">Go Back</button>
        </div>
    </div>

    <script>
        let currentBlob = null; // Store image blob for sharing
        let base64DataUrl = "";  // Backup base64

        window.onload = function() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            document.getElementById("inDate").value = `${dd}/${mm}/${yyyy}`;
            initDragAndDrop();
        };

        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const wrapper = document.getElementById('previewWrapper');
                wrapper.style.backgroundImage = `url('${reader.result}')`;
                
                document.getElementById('placeholderText').style.display = 'none';
                const overlays = document.querySelectorAll('.overlay');
                overlays.forEach(el => el.style.display = 'block');
                
                updatePrescription();
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updatePrescription() {
            document.getElementById("outName").textContent = document.getElementById("inName").value;
            document.getElementById("outAge").textContent = document.getElementById("inAge").value;
            document.getElementById("outSex").textContent = document.getElementById("inSex").value;
            document.getElementById("outDate").textContent = document.getElementById("inDate").value;
            document.getElementById("outVitals").textContent = document.getElementById("inVitals").value;
            document.getElementById("outMeds").textContent = document.getElementById("inMeds").value;
        }

        function changeFont(fontFamily) {
            const overlays = document.querySelectorAll('.overlay');
            overlays.forEach(el => el.style.fontFamily = fontFamily);
        }

        function changeFontSize(val) {
            const parsedVal = parseFloat(val);
            document.getElementById("outName").style.fontSize = parsedVal + "cqw";
            document.getElementById("outAge").style.fontSize = (parsedVal - 0.4) + "cqw";
            document.getElementById("outSex").style.fontSize = (parsedVal - 0.4) + "cqw";
            document.getElementById("outDate").style.fontSize = (parsedVal - 0.7) + "cqw";
            document.getElementById("outVitals").style.fontSize = (parsedVal - 1.2) + "cqw";
            document.getElementById("outMeds").style.fontSize = (parsedVal - 0.9) + "cqw";
        }

        // Bypasses local app downloads by forcing it open in Chrome/Safari
        function openInExternalBrowser() {
            window.open(window.location.href, '_system'); // standard webtoapp system link
            window.open(window.location.href, '_blank');  // fallback tab
        }

        function generatePrescriptionImage() {
            const container = document.getElementById('previewWrapper');
            
            const hasBg = container.style.backgroundImage !== '';
            if(!hasBg) {
                alert("Please upload your blank template image first.");
                return;
            }

            // Hide dashed borders during image export
            const overlays = document.querySelectorAll('.overlay');
            overlays.forEach(el => el.style.border = 'none');

            html2canvas(container, {
                useCORS: true,
                scale: 3, // High-res clarity
                backgroundColor: null
            }).then(canvas => {
                base64DataUrl = canvas.toDataURL('image/png');
                
                const modalImg = document.getElementById('modalImage');
                modalImg.src = base64DataUrl;

                // Convert base64 to file blob for Web Share API compatibility
                canvas.toBlob((blob) => {
                    currentBlob = blob;
                }, 'image/png');

                // Show action Modal
                document.getElementById('downloadModal').style.display = 'flex';
                
                // Restore borders for design stage
                overlays.forEach(el => {
                    el.style.border = '1px dashed transparent';
                });
            }).catch(err => {
                console.error("Image render failed: ", err);
                alert("Render failed. Use the browser redirect bypass button below.");
            });
        }

        // Uses system-level sharing menu (Bypasses WebView blockages completely)
        async function sharePrescription() {
            if (!currentBlob) {
                alert("Image preparing, please try again in a second.");
                return;
            }

            try {
                const file = new File([currentBlob], "Prescription.png", { type: "image/png" });
                
                // Check if device supports sharing file files (modern phones)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Prescription Detail',
                        text: 'Prescription created via Koushik Clinic.'
                    });
                } else if (navigator.share) {
                    // Fallback to text url share
                    await navigator.share({
                        title: 'Prescription Detail',
                        text: 'Check your prescription inside your browser files.'
                    });
                } else {
                    // Manual fallbacks if sharing API is locked/restricted
                    const fallbackEmail = `mailto:?subject=Patient Prescription&body=Name: ${document.getElementById("inName").value}%0D%0AMedication: ${encodeURIComponent(document.getElementById("inMeds").value)}`;
                    window.location.href = fallbackEmail;
                }
            } catch (error) {
                console.log('Share failed, attempting backup share...', error);
                // Secondary backup: Launch default mail compose
                const mailBackup = `mailto:?subject=Clinic Prescription&body=Prescription text updated: ${encodeURIComponent(document.getElementById("inMeds").value)}`;
                window.location.href = mailBackup;
            }
        }

        function closeModal() {
            document.getElementById('downloadModal').style.display = 'none';
        }

        function initDragAndDrop() {
            const draggables = document.querySelectorAll('.draggable');
            const container = document.getElementById('previewWrapper');

            draggables.forEach(el => {
                let isDragging = false;
                let startX, startY;
                let initialLeft, initialTop;

                el.addEventListener('mousedown', startDrag);
                el.addEventListener('touchstart', startDrag, { passive: false });

                function startDrag(e) {
                    isDragging = true;
                    const event = e.touches ? e.touches[0] : e;
                    startX = event.clientX;
                    startY = event.clientY;

                    const rect = el.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    
                    initialLeft = rect.left - containerRect.left;
                    initialTop = rect.top - containerRect.top;

                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('mouseup', stopDrag);
                    document.addEventListener('touchend', stopDrag);
                }

                function dragMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();

                    const event = e.touches ? e.touches[0] : e;
                    const deltaX = event.clientX - startX;
                    const deltaY = event.clientY - startY;

                    const currentLeftPx = initialLeft + deltaX;
                    const currentTopPx = initialTop + deltaY;

                    const containerRect = container.getBoundingClientRect();
                    const leftPercent = (currentLeftPx / containerRect.width) * 100;
                    const topPercent = (currentTopPx / containerRect.height) * 100;

                    el.style.left = leftPercent + '%';
                    el.style.top = topPercent + '%';
                }

                function stopDrag() {
                    isDragging = false;
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('touchmove', dragMove);
                }
            });
        }
    </script>
</body>
</html>
