<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koushik Clinic - Stable Prescription Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Herr+Von+Muellerhoff&family=Over+the+Rainbow&family=League+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e0533c;
            --blue-ink: #102a73;
            --green-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .editor-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .col {
            flex: 1;
        }

        .file-input-wrapper {
            background-color: #e3faf2;
            border: 2px dashed var(--green-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-update {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-download {
            background-color: var(--green-color);
            color: white;
        }

        .btn-print {
            background-color: #2d3748;
            color: white;
        }

        /* Responsive container preserving visual aspects */
        .prescription-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3072 / 4096;
            background-color: #e5e5e5;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            container-type: inline-size;
            container-name: prescription;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-weight: bold;
            width: 80%;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            color: var(--blue-ink);
            font-family: 'Reenie Beanie', cursive;
            font-weight: 500;
            line-height: 1.2;
            white-space: pre-wrap;
            cursor: move;
            display: none;
            touch-action: none;
            padding: 4px;
            border: 1px dashed rgba(0,0,0,0.15);
        }

        /* Default drag placements */
        #outName   { left: 17%; top: 20.2%; font-size: 5.2cqw; }
        #outAge    { left: 56%; top: 20.2%; font-size: 4.8cqw; }
        #outSex    { left: 17%; top: 22.4%; font-size: 4.8cqw; }
        #outDate   { left: 56%; top: 22.4%; font-size: 4.5cqw; }
        #outVitals { left: 8%;  top: 32.0%; font-size: 4.0cqw; line-height: 1.8; }
        #outMeds   { left: 45%; top: 32.0%; font-size: 4.3cqw; line-height: 2.1; }

        /* Mobile Safe Long-Press Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 99999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            box-sizing: border-box;
            padding: 15px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-instructions {
            color: #fff;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 90%;
        }

        .modal-content {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            user-select: contain !important;
            -webkit-user-select: contain !important;
        }

        .btn-close-modal {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 30px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            flex: none;
            width: auto;
        }

        @media print {
            .editor-container, .image-modal { display: none !important; }
            body { padding: 0; margin: 0; }
            .prescription-wrapper {
                box-shadow: none !important;
                width: 100vw !important;
                height: 133.33vw !important;
                position: absolute !important;
                top: 0; left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Koushik Clinic Prescription Maker</h2>
        
        <div class="file-input-wrapper">
            <label style="color:#27ae60; margin-bottom:5px;">Step 1: Choose your blank prescription template image</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="loadImage(event)">
        </div>

        <form id="rxForm" onsubmit="event.preventDefault(); updatePrescription();">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inName">Patient Name</label>
                        <input type="text" id="inName" value="Koushik">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inAge">Age</label>
                        <input type="text" id="inAge" value="23 Yrs">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="inSex">Gender</label>
                        <input type="text" id="inSex" value="✔ Male">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="inDate">Date</label>
                        <input type="text" id="inDate">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="fontSelect">Handwriting Font Style</label>
                        <select id="fontSelect" onchange="changeFont(this.value)">
                            <option value="'Reenie Beanie', cursive">Fast Clinical Script</option>
                            <option value="'Nothing You Could Do', cursive">Relaxed Blue Ink</option>
                            <option value="'Over the Rainbow', cursive">Compact Felt Tip Pen</option>
                            <option value="'Herr Von Muellerhoff', cursive">Classic Sharp Cursive</option>
                            <option value="'League Script', sans-serif">Slanted Fine-Tip Pen</option>
                        </select>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="fontSizeSlider">Font Size Scale</label>
                        <input type="range" id="fontSizeSlider" min="3" max="7" step="0.1" value="4.8" oninput="changeFontSize(this.value)">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="inVitals">Symptoms / Vitals (Left Side)</label>
                <textarea id="inVitals">Fever - 3 Days&#10;BP: 120/80&#10;Pulse: 78</textarea>
            </div>

            <div class="form-group">
                <label for="inMeds">Treatment / Rx (Right Side)</label>
                <textarea id="inMeds">1. Tab. Clavam 625 mg&#10;   1 - 0 - 1  x 5 days&#10;&#10;2. Tab. Paracetamol 650&#10;   1 - 1 - 1 (SOS)</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-update">Update Text</button>
                <div class="btn-row">
                    <button type="button" class="btn-download" onclick="generatePrescriptionNative()">Save to Phone</button>
                    <button type="button" class="btn-print" onclick="window.print()">Print / Save PDF</button>
                </div>
            </div>
        </form>
    </div>

    <div class="prescription-wrapper" id="previewWrapper">
        <div class="placeholder-text" id="placeholderText">
            Please choose your 'blank-prescription' image above to begin editing.
        </div>
        <div id="outName" class="overlay draggable" data-rel-size="5.2"></div>
        <div id="outAge" class="overlay draggable" data-rel-size="4.8"></div>
        <div id="outSex" class="overlay draggable" data-rel-size="4.8"></div>
        <div id="outDate" class="overlay draggable" data-rel-size="4.5"></div>
        <div id="outVitals" class="overlay draggable" data-rel-size="4.0" style="line-height: 1.8;"></div>
        <div id="outMeds" class="overlay draggable" data-rel-size="4.3" style="line-height: 2.1;"></div>
    </div>

    <div id="downloadModal" class="image-modal">
        <div class="modal-instructions">
            📸 <strong>Prescription Generated Successfully!</strong><br>
            <strong>Hold down (long-press)</strong> on the image below, then choose <strong>"Download Image"</strong> or <strong>"Save Image"</strong>.
        </div>
        <img id="modalImage" class="modal-content" alt="Generated Prescription">
        <button class="btn-close-modal" onclick="closeModal()">Go Back</button>
    </div>

    <script>
        let uploadedImgObj = null; // Global image object to draw natively
        let currentFontFamily = "'Reenie Beanie', cursive";

        window.onload = function() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            document.getElementById("inDate").value = `${dd}/${mm}/${yyyy}`;
            initDragAndDrop();
        };

        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                // Set background preview
                const wrapper = document.getElementById('previewWrapper');
                wrapper.style.backgroundImage = `url('${reader.result}')`;
                
                // Load into native Image object safely
                uploadedImgObj = new Image();
                uploadedImgObj.src = reader.result;

                document.getElementById('placeholderText').style.display = 'none';
                const overlays = document.querySelectorAll('.overlay');
                overlays.forEach(el => el.style.display = 'block');
                
                updatePrescription();
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updatePrescription() {
            document.getElementById("outName").textContent = document.getElementById("inName").value;
            document.getElementById("outAge").textContent = document.getElementById("inAge").value;
            document.getElementById("outSex").textContent = document.getElementById("inSex").value;
            document.getElementById("outDate").textContent = document.getElementById("inDate").value;
            document.getElementById("outVitals").textContent = document.getElementById("inVitals").value;
            document.getElementById("outMeds").textContent = document.getElementById("inMeds").value;
        }

        function changeFont(fontFamily) {
            currentFontFamily = fontFamily;
            const overlays = document.querySelectorAll('.overlay');
            overlays.forEach(el => el.style.fontFamily = fontFamily);
        }

        function changeFontSize(val) {
            const parsedVal = parseFloat(val);
            document.getElementById("outName").setAttribute('data-rel-size', parsedVal);
            document.getElementById("outAge").setAttribute('data-rel-size', parsedVal - 0.4);
            document.getElementById("outSex").setAttribute('data-rel-size', parsedVal - 0.4);
            document.getElementById("outDate").setAttribute('data-rel-size', parsedVal - 0.7);
            document.getElementById("outVitals").setAttribute('data-rel-size', parsedVal - 1.2);
            document.getElementById("outMeds").setAttribute('data-rel-size', parsedVal - 0.9);

            document.getElementById("outName").style.fontSize = parsedVal + "cqw";
            document.getElementById("outAge").style.fontSize = (parsedVal - 0.4) + "cqw";
            document.getElementById("outSex").style.fontSize = (parsedVal - 0.4) + "cqw";
            document.getElementById("outDate").style.fontSize = (parsedVal - 0.7) + "cqw";
            document.getElementById("outVitals").style.fontSize = (parsedVal - 1.2) + "cqw";
            document.getElementById("outMeds").style.fontSize = (parsedVal - 0.9) + "cqw";
        }

        // Native canvas rendering (Crash-proof and runs completely offline)
        function generatePrescriptionNative() {
            if (!uploadedImgObj) {
                alert("Please upload your blank template image first.");
                return;
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size matching the original template image resolution (e.g. 3072x4096)
            canvas.width = uploadedImgObj.naturalWidth;
            canvas.height = uploadedImgObj.naturalHeight;

            // Draw template background
            ctx.drawImage(uploadedImgObj, 0, 0, canvas.width, canvas.height);

            const container = document.getElementById('previewWrapper');
            const containerRect = container.getBoundingClientRect();
            const overlays = document.querySelectorAll('.overlay');

            overlays.forEach(el => {
                const rect = el.getBoundingClientRect();
                
                // Calculate percentage relative coordinates from the screen editor
                const pctX = ((rect.left - containerRect.left) / containerRect.width);
                const pctY = ((rect.top - containerRect.top) / containerRect.height);

                // Map percentages back to the high-res canvas scale
                const canvasX = pctX * canvas.width;
                const canvasY = pctY * canvas.height;

                // Grab custom sizes
                const relSize = parseFloat(el.getAttribute('data-rel-size') || '4.5');
                const canvasFontSize = (relSize / 100) * canvas.width; // font sizes scale relative to template width

                // Apply style
                ctx.fillStyle = '#102a73'; // Ink Blue
                ctx.font = `500 ${canvasFontSize}px ${currentFontFamily}`;
                ctx.textBaseline = "top";

                // Handle multi-line writing
                const lines = el.textContent.split('\n');
                let lineSpacingMultiplier = 1.3;
                if (el.id === 'outVitals') lineSpacingMultiplier = 1.8;
                if (el.id === 'outMeds') lineSpacingMultiplier = 2.1;

                const computedLineHeight = canvasFontSize * lineSpacingMultiplier;

                lines.forEach((line, index) => {
                    ctx.fillText(line, canvasX, canvasY + (index * computedLineHeight));
                });
            });

            // Convert to a base64 JPEG safely
            try {
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                const modalImg = document.getElementById('modalImage');
                modalImg.src = imgData;

                // Show modal window
                document.getElementById('downloadModal').style.display = 'flex';
            } catch (err) {
                alert("Failed to render the image canvas locally: " + err.message);
            }
        }

        function closeModal() {
            document.getElementById('downloadModal').style.display = 'none';
        }

        function initDragAndDrop() {
            const draggables = document.querySelectorAll('.draggable');
            const container = document.getElementById('previewWrapper');

            draggables.forEach(el => {
                let isDragging = false;
                let startX, startY, initialLeft, initialTop;

                // Desktop events
                el.addEventListener('mousedown', startDrag);
                // Mobile finger drag events
                el.addEventListener('touchstart', startDrag, { passive: false });

                function startDrag(e) {
                    isDragging = true;
                    const event = e.touches ? e.touches[0] : e;
                    startX = event.clientX;
                    startY = event.clientY;

                    const rect = el.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    
                    initialLeft = rect.left - containerRect.left;
                    initialTop = rect.top - containerRect.top;

                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('mouseup', stopDrag);
                    document.addEventListener('touchend', stopDrag);
                }

                function dragMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();

                    const event = e.touches ? e.touches[0] : e;
                    const deltaX = event.clientX - startX;
                    const deltaY = event.clientY - startY;

                    const currentLeftPx = initialLeft + deltaX;
                    const currentTopPx = initialTop + deltaY;

                    const containerRect = container.getBoundingClientRect();
                    const leftPercent = (currentLeftPx / containerRect.width) * 100;
                    const topPercent = (currentTopPx / containerRect.height) * 100;

                    // Bound checking limits
                    el.style.left = Math.max(0, Math.min(leftPercent, 90)) + '%';
                    el.style.top = Math.max(0, Math.min(topPercent, 95)) + '%';
                }

                function stopDrag() {
                    isDragging = false;
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('touchmove', dragMove);
                }
            });
        }
    </script>
</body>
</html>
