<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koushik Clinic - Drag & Drop Prescription Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Herr+Von+Muellerhoff&family=Over+the+Rainbow&family=League+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #e0533c;
            --blue-ink: #102a73;
            --green-color: #2ecc71;
            --whatsapp-color: #25d366;
            --download-color: #3182ce;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .editor-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
            font-family: monospace;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .col {
            flex: 1;
        }

        .file-input-wrapper {
            background-color: #e3faf2;
            border: 2px dashed var(--green-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-update {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-share {
            background-color: var(--whatsapp-color);
            color: white;
        }

        .btn-download {
            background-color: var(--download-color);
            color: white;
        }

        .btn-print {
            background-color: #2d3748;
            color: white;
        }

        .bypass-box {
            background-color: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid #cbd5e0;
        }

        .prescription-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3072 / 4096;
            background-color: #e5e5e5;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            container-type: inline-size;
            container-name: prescription;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-weight: bold;
            width: 80%;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            color: var(--blue-ink);
            font-family: 'Reenie Beanie', cursive;
            font-weight: 500;
            line-height: 1.2;
            white-space: pre-wrap;
            transform: rotate(-0.5deg);
            cursor: move;
            display: none;
            touch-action: none;
            padding: 4px;
            border: 1px dashed transparent;
        }

        .overlay:active {
            border: 1px dashed var(--primary-color);
            background: rgba(224, 83, 60, 0.05);
        }

        #outName   { left: 17%; top: 20.2%; font-size: 5.2cqw; }
        #outAge    { left: 56%; top: 20.2%; font-size: 4.8cqw; }
        #outSex    { left: 17%; top: 22.4%; font-size: 4.8cqw; }
        #outDate   { left: 56%; top: 22.4%; font-size: 4.5cqw; }
        #outVitals { left: 8%;  top: 32.0%; font-size: 4.0cqw; line-height: 1.8; }
        #outMeds   { left: 45%; top: 32.0%; font-size: 4.3cqw; line-height: 2.1; }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            box-sizing: border-box;
            padding: 15px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            display: block;
        }

        .modal-instructions {
            color: #fff;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.4;
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 8px;
            max-width: 500px;
        }

        .btn-close-modal {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: auto;
        }

        @media print {
            .editor-container, .image-modal { display: none !important; }
            .prescription-wrapper {
                box-shadow: none !important;
                border-radius: 0 !important;
                width: 100vw !important;
                height: 133.33vw !important;
                position: absolute !important;
                top: 0 !important; left: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Koushik Clinic Assistant</h2>
        
        <div class="file-input-wrapper">
            <label style="color:#27ae60; margin-bottom:5px;">Step 1: Choose your blank-prescription.jpg</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="loadImage(event)">
        </div>

        <form id="rxForm" onsubmit="event.preventDefault(); updatePrescription();">
            <div class="row">
                <div class="col"><div class="form-group"><label>Patient Name</label><input type="text" id="inName" value="Koushik"></div></div>
                <div class="col"><div class="form-group"><label>Age</label><input type="text" id="inAge" value="23 Yrs"></div></div>
            </div>
            <div class="row">
                <div class="col"><div class="form-group"><label>Gender</label><input type="text" id="inSex" value="✔ Male"></div></div>
                <div class="col"><div class="form-group"><label>Date</label><input type="text" id="inDate"></div></div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>Handwriting Style</label>
                        <select id="fontSelect" onchange="changeFont(this.value)">
                            <option value="'Reenie Beanie', cursive">Fast Clinical Script</option>
                            <option value="'Nothing You Could Do', cursive">Relaxed Blue Ink</option>
                        </select>
                    </div>
                </div>
                <div class="col"><div class="form-group"><label>Font Scale</label><input type="range" id="fontSizeSlider" min="3" max="7" step="0.1" value="4.8" oninput="changeFontSize(this.value)"></div></div>
            </div>

            <div class="form-group"><label>Symptoms / Vitals (Left Side)</label><textarea id="inVitals">Fever - 3 Days&#10;BP: 120/80</textarea></div>
            <div class="form-group"><label>Treatment / Rx (Right Side)</label><textarea id="inMeds">1. Tab. Clavam 625 mg&#10;   1 - 0 - 1  x 5 days</textarea></div>

            <div class="btn-group">
                <button type="submit" class="btn-update">Update Layout Elements</button>
                <div class="btn-row">
                    <button type="button" class="btn-download" onclick="triggerPrescriptionDownload()">
                        📥 Download File
                    </button>
                    <button type="button" class="btn-print" onclick="window.print()">Print / PDF</button>
                </div>
                
                <div class="bypass-box">
                    <button type="button" style="background-color: #4a5568; color: white; padding: 10px;" onclick="redirectToExternalBrowser()">
                        🌐 Safe App Browser Redirect Bypass
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="prescription-wrapper" id="previewWrapper">
        <div class="placeholder-text" id="placeholderText">Please upload your background sheet template to begin.</div>
        <div id="outName" class="overlay draggable"></div>
        <div id="outAge" class="overlay draggable"></div>
        <div id="outSex" class="overlay draggable"></div>
        <div id="outDate" class="overlay draggable"></div>
        <div id="outVitals" class="overlay draggable"></div>
        <div id="outMeds" class="overlay draggable"></div>
    </div>

    <div id="downloadModal" class="image-modal">
        <div class="modal-instructions">
            🎉 <strong>Prescription Document Rendered!</strong><br>
            If using the native wrapper application, <strong>long-press (hold your finger down)</strong> on the prescription image layer below to click <strong>"Save Image"</strong> directly to your phone's photos.
        </div>
        <img id="modalImage" class="modal-content" alt="Prescription Sheet">
        <button class="btn-close-modal" onclick="closeModal()">Return to Editor</button>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('rxData')) { loadStateFromUrl(urlParams.get('rxData')); }
            else {
                const today = new Date();
                document.getElementById("inDate").value = `${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
            }
            initDragAndDrop();
        };

        function getSerializedState() {
            return btoa(unescape(encodeURIComponent(JSON.stringify({
                n: document.getElementById("inName").value, a: document.getElementById("inAge").value,
                s: document.getElementById("inSex").value, d: document.getElementById("inDate").value,
                v: document.getElementById("inVitals").value, m: document.getElementById("inMeds").value,
                f: document.getElementById("fontSelect").value, sz: document.getElementById("fontSizeSlider").value
            }))));
        }

        function loadStateFromUrl(encodedData) {
            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
                document.getElementById("inName").value = data.n; document.getElementById("inAge").value = data.a;
                document.getElementById("inSex").value = data.s; document.getElementById("inDate").value = data.d;
                document.getElementById("inVitals").value = data.v; document.getElementById("inMeds").value = data.m;
                document.getElementById('placeholderText').style.display = 'none';
                document.querySelectorAll('.overlay').forEach(el => el.style.display = 'block');
                updatePrescription();
            } catch(e) { console.error(e); }
        }

        function redirectToExternalBrowser() {
            window.location.href = `${window.location.href.split('?')[0]}?rxData=${getSerializedState()}`;
        }

        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('previewWrapper').style.backgroundImage = `url('${reader.result}')`;
                document.getElementById('placeholderText').style.display = 'none';
                document.querySelectorAll('.overlay').forEach(el => el.style.display = 'block');
                updatePrescription();
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updatePrescription() {
            document.getElementById("outName").textContent = document.getElementById("inName").value;
            document.getElementById("outAge").textContent = document.getElementById("inAge").value;
            document.getElementById("outSex").textContent = document.getElementById("inSex").value;
            document.getElementById("outDate").textContent = document.getElementById("inDate").value;
            document.getElementById("outVitals").textContent = document.getElementById("inVitals").value;
            document.getElementById("outMeds").textContent = document.getElementById("inMeds").value;
        }

        function changeFont(f) { document.querySelectorAll('.overlay').forEach(el => el.style.fontFamily = f); }
        function changeFontSize(v) { document.querySelectorAll('.overlay').forEach(el => el.style.fontSize = v + "cqw"); }

        function triggerPrescriptionDownload() {
            const container = document.getElementById('previewWrapper');
            if(container.style.backgroundImage === '') { alert("Upload a template image first!"); return; }

            document.querySelectorAll('.overlay').forEach(el => el.style.border = 'none');

            html2canvas(container, { scale: 2.5 }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                // Native Web Fallback Trigger
                const testAnchor = document.createElement('a');
                testAnchor.href = imgData;
                testAnchor.download = `Prescription_${Date.now()}.jpg`;
                document.body.appendChild(testAnchor);
                testAnchor.click();
                document.body.removeChild(testAnchor);

                // Wrapper Safety Modal popup view fallback
                document.getElementById('modalImage').src = imgData;
                document.getElementById('downloadModal').style.display = 'flex';
                document.querySelectorAll('.overlay').forEach(el => el.style.border = '1px dashed transparent');
            });
        }

        function closeModal() { document.getElementById('downloadModal').style.display = 'none'; }

        function initDragAndDrop() {
            document.querySelectorAll('.draggable').forEach(el => {
                let isDragging = false; let startX, startY, initialLeft, initialTop;
                const startDrag = (e) => {
                    isDragging = true; const ev = e.touches ? e.touches[0] : e;
                    startX = ev.clientX; startY = ev.clientY;
                    initialLeft = el.offsetLeft; initialTop = el.offsetTop;
                    document.addEventListener('mousemove', dragMove); document.addEventListener('touchmove', dragMove, {passive:false});
                };
                const dragMove = (e) => {
                    if (!isDragging) return; e.preventDefault();
                    const ev = e.touches ? e.touches[0] : e;
                    const wrapper = document.getElementById('previewWrapper');
                    el.style.left = ((initialLeft + (ev.clientX - startX)) / wrapper.offsetWidth * 100) + '%';
                    el.style.top = ((initialTop + (ev.clientY - startY)) / wrapper.offsetHeight * 100) + '%';
                };
                el.addEventListener('mousedown', startDrag); el.addEventListener('touchstart', startDrag, {passive:false});
            });
        }
    </script>
</body>
</html>
